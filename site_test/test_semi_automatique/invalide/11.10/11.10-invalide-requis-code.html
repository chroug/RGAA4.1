<!-- Le piège : Il y a une étoile visuelle (*) pour dire que c'est obligatoire, mais il manque l'attribut required ou aria-required="true".

Ce que ça teste : Ton outil détecte-t-il l'oubli de l'attribut pour les lecteurs d'écran quand le label suggère une obligation ? -->
<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Invalide 11.10 - Requis code manquant</title></head>
<body>
    <form>
        <label for="email">Email * :</label>
        <input type="email" id="email" name="email">
        <button type="submit">Envoyer</button>
    </form>
</body>
</html>
