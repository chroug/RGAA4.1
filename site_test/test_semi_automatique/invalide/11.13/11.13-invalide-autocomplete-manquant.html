<!-- Le piège : Le formulaire demande des données personnelles classiques (prénom, email) mais il n'y a pas d'attribut autocomplete.

Ce que ça teste : Ton outil détecte-t-il l'absence de l'attribut sur des champs d'identité évidents ? -->
<!DOCTYPE html>
<html lang="fr">
<head><meta charset="UTF-8"><title>Invalide 11.13 - Autocomplete manquant</title></head>
<body>
    <form>
        <p>Créez votre compte :</p>
        
        <label for="prenom">Prénom :</label>
        <input type="text" id="prenom" name="prenom"><br>

        <label for="email">Adresse email :</label>
        <input type="email" id="email" name="email">
    </form>
</body>
</html>
