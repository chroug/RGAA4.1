<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Tests Valides Complexes - Critère 2.2</title>
    <style>iframe { display: block; margin-bottom: 20px; }</style>
</head>
<body>
    <h1>Cadres avec titres pertinents (Cas Complexes)</h1>
    
    <!-- 1. Vidéo avec un titre très spécifique -->
    <h2>1. Vidéo musicale</h2>
    <iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=0" 
            title="Clip musical officiel de Never Gonna Give You Up par Rick Astley" 
            width="560" height="315">
    </iframe>

    <!-- 2. Carte interactive avec contexte détaillé -->
    <h2>2. Carte interactive</h2>
    <iframe src="https://www.openstreetmap.org/export/embed.html?bbox=2.25%2C48.8%2C2.4%2C48.9&layer=mapnik" 
            title="Plan géographique interactif du centre de Paris" 
            width="600" height="400">
    </iframe>

    <!-- 3. Article encyclopédique (texte dense) -->
    <h2>3. Article Wikipédia</h2>
    <iframe src="https://fr.wikipedia.org/wiki/Accessibilit%C3%A9_du_web" 
            title="Article Wikipédia détaillant les concepts de l'accessibilité du Web" 
            width="600" height="400">
    </iframe>

    <!-- 4. Titre court mais tout à fait exact -->
    <h2>4. Titre minimaliste mais juste</h2>
    <iframe src="https://www.google.com/maps/embed?pb=" 
            title="Carte" 
            width="300" height="200">
    </iframe>
</body>
</html>
