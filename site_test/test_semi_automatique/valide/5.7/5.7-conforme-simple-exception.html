<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Valide 5.7 - Tableau simple sans attribut</title>
</head>
<body>
    <main>
        <!-- TEST ALGO/IA ✅ : Tableau à simple entrée (une seule ligne d'en-tête). 
             L'absence de scope ou d'id est autorisée par le RGAA (Cas particuliers). -->
        <table>
            <caption>Liste des employés du service IT</caption>
            <thead>
                <tr>
                    <th>Nom</th>
                    <th>Prénom</th>
                    <th>Poste</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Dupont</td>
                    <td>Jean</td>
                    <td>Développeur</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
