<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Valide 5.2 - Résumé pertinent</title>
</head>
<body>
    <main>
        <!-- 🔥 Le résumé est maintenant exhaustif : il explique le quoi, les colonnes, ET les lignes. -->
        <table summary="Ce tableau présente les ventes de l'année 2023. Les lignes représentent les régions géographiques (comme le Nord). Les colonnes principales sont les trimestres, qui sont eux-mêmes sous-divisés en deux canaux de vente : Boutique et En ligne.">
            <caption>Ventes 2023 par région et canal</caption>
            <thead>
                <tr>
                    <td rowspan="2"></td>
                    <th colspan="2" scope="colgroup">Trimestre 1</th> 
                </tr>
                <tr>
                    <th scope="col">Boutique</th>
                    <th scope="col">En ligne</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="row">Nord</th>
                    <td>1500</td>
                    <td>2000</td>
                </tr>
                <tr>
                    <th scope="row">Sud</th>
                    <td>1200</td>
                    <td>1800</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
