<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Valide 5.1 - Tableau complexe avec attribut summary</title>
</head>
<body>
    <main>
        <h1>Résultats trimestriels</h1>
        
        <!-- TEST ALGO ⚡ : C'est un tableau complexe (il y a un th avec colspan="2"). 
             Il possède bien un attribut 'summary' rempli. -> CONFORME -->
        <table summary="Le tableau regroupe les ventes par zone géographique. La première ligne d'en-tête sépare la France de l'International.">
            <thead>
                <tr>
                    <td rowspan="2"></td>
                    <th colspan="2" scope="colgroup">France</th>
                    <th colspan="2" scope="colgroup">International</th>
                </tr>
                <tr>
                    <th scope="col">Nord</th>
                    <th scope="col">Sud</th>
                    <th scope="col">Europe</th>
                    <th scope="col">Monde</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <th scope="row">Ventes (k€)</th>
                    <td>150</td>
                    <td>120</td>
                    <td>400</td>
                    <td>900</td>
                </tr>
            </tbody>
        </table>
    </main>
</body>
</html>
