<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Valide 6.2 - Lien texte classique</title>
</head>
<body>
    <main>
        <h1>Liens classiques</h1>
        <!-- TEST ALGO ⚡ : Cas le plus simple, le lien contient du texte. -> CONFORME -->
        <p>Visitez notre <a href="https://example.com">page de contact</a>.</p>
        
        <!-- TEST ALGO ⚡ : Élément avec role="link" contenant du texte. -> CONFORME -->
        <span role="link" tabindex="0" onclick="goToPage()">Mentions légales</span>
    </main>
</body>
</html>
