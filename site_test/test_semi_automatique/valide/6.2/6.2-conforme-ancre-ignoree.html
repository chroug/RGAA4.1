<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Valide 6.2 - Ancre sans href (Ignorée)</title>
</head>
<body>
    <main>
        <h1>Test des ancres</h1>
        <!-- TEST ALGO ⚡ : Selon la note technique du RGAA 6.2, une ancre (<a> sans href) 
             n'est pas un lien. Elle doit être totalement ignorée par l'outil, 
             même si elle est vide. -> CONFORME (ou Non Applicable) -->
        <a name="haut-de-page"></a>
        <p>Contenu de la page...</p>
    </main>
</body>
</html>
