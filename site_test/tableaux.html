<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Erreurs Tableaux</title>
</head>
<body>
    <nav><ul><li><a href="index.html">Retour</a></li></ul></nav>
    <main>
        <h1>Test des Tableaux (Critère 5.6 et 10.1)</h1>

        <!-- ERREUR RGAA 10.1 : Utilisation de width, border et bgcolor en HTML au lieu du CSS -->
        <table border="1" width="100%" bgcolor="#eef">
            
            <!-- ERREUR RGAA 5.6 : Présence d'en-têtes <th> mais SANS attribut scope ni id/headers pour relier aux données -->
            <tr>
                <th>Nom de l'employé</th>
                <th>Âge</th>
                <th>Poste</th>
            </tr>
            <tr>
                <!-- Erreur 5.6 aggravée : utiliser un <th> comme cellule de donnée sans scope="row" -->
                <th>Martin Dupont</th>
                <td>34</td>
                <td>Développeur</td>
            </tr>
            <tr>
                <th>Julie Blanc</th>
                <td>28</td>
                <td>Designer</td>
            </tr>
        </table>
    </main>
</body>
</html>
