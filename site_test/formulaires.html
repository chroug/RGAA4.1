<!DOCTYPE html>
<html lang="fr">
<head>
    <title>Erreurs Formulaires</title>
</head>
<body>
    <nav><ul><li><a href="index.html">Retour</a></li></ul></nav>
    <main>
        <h1>Test des Formulaires (Critères 11.1, 11.6, 11.8, 11.9)</h1>

        <form>
            <!-- ERREUR RGAA 11.1 : Label sans "for", ou "for" qui ne correspond à aucun id -->
            <label>Votre ville :</label>
            <input type="text" name="ville"> <br><br>

            <label for="mauvais_id">Code postal :</label>
            <input type="text" id="code_postal"> <br><br>

            <!-- ERREUR RGAA 11.6 : Fieldset (groupe de champs) SANS balise <legend> -->
            <fieldset>
                <input type="radio" name="choix" id="c1" value="oui"> <label for="c1">Oui</label>
                <input type="radio" name="choix" id="c2" value="non"> <label for="c2">Non</label>
            </fieldset>
            <br>

            <!-- ERREUR RGAA 11.8 : Fausse catégorisation dans un select (options désactivées au lieu de <optgroup>) -->
            <label for="menu">Choisissez un plat :</label>
            <select id="menu">
                <option disabled>--- Entrées ---</option>
                <option value="salade">Salade</option>
                <option disabled>--- Plats ---</option>
                <option value="pates">Pâtes</option>
            </select>
            <br><br>

            <!-- ERREUR RGAA 11.9 : Boutons d'action sans nom accessible -->
            
            <!-- 1. Bouton complètement vide -->
            <button></button> 
            
            <!-- 2. Input submit avec une valeur vide -->
            <input type="submit" value=""> 

            <!-- 3. Bouton avec uniquement une image sans attribut alt -->
            <button>
                <img src="https://via.placeholder.com/20" />
            </button>
        </form>

    </main>
</body>
</html>
